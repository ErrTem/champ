<ion-content fullscreen="true" class="auth-shell">
  <div class="auth-hero">
    <p class="kicker">Admin</p>
    <h1 class="display">Fighter approvals</h1>
    <p class="sub">Approve pending fighter accounts.</p>
  </div>

  <div class="auth-form">
    @if (error) {
      <ion-text color="danger"><p class="field-error">{{ error }}</p></ion-text>
    }

    <ion-button expand="block" type="button" fill="outline" [disabled]="loading" (click)="fetch()">
      Refresh
    </ion-button>

    @if (loading) {
      <ion-card>
        <ion-card-content>
          <ion-skeleton-text animated="true" style="width: 90%"></ion-skeleton-text>
          <ion-skeleton-text animated="true" style="width: 70%"></ion-skeleton-text>
        </ion-card-content>
      </ion-card>
    } @else if (users.length === 0) {
      <p class="sub">No pending fighters</p>
    } @else {
      <ion-card>
        <ion-card-content>
          <p class="kicker">Pending</p>
          <ion-list lines="none">
            @for (u of users; track u.id) {
              <ion-item lines="none">
                <ion-label>
                  <div class="kicker">{{ u.email }}</div>
                  <div class="sub">{{ u.name || '—' }} · {{ u.phone || '—' }}</div>
                </ion-label>
                <ion-button type="button" fill="clear" [disabled]="saving" (click)="approve(u.id)">
                  Approve
                </ion-button>
              </ion-item>
            }
          </ion-list>
        </ion-card-content>
      </ion-card>
    }
  </div>
</ion-content>
