<ion-content class="auth-shell" fullscreen="true">
  <div class="auth-hero">
    <p class="kicker">Champ</p>
    <h1 class="display">Join the gallery</h1>
    <p class="sub">Train with legends</p>
  </div>

  <form class="auth-form" (ngSubmit)="submit()">
    @if (error) {
      <ion-text color="danger"><p class="field-error">{{ error }}</p></ion-text>
    }
    <ion-input
      label="Name"
      labelPlacement="stacked"
      type="text"
      autocomplete="name"
      [(ngModel)]="name"
      name="name"
    />
    <ion-input
      label="Email"
      labelPlacement="stacked"
      type="email"
      autocomplete="email"
      [(ngModel)]="email"
      name="email"
      required
    />
    <div class="phone-row mac-control-group" role="group" aria-labelledby="phone-us-label">
      <div class="phone-cc" aria-hidden="true" title="United States +1">
        +1
      </div>
      <ion-input
        class="phone-input"
        aria-label="US area code and phone number"
        labelPlacement="stacked"
        type="tel"
        inputmode="numeric"
        autocomplete="tel-national"
        maxlength="14"
        placeholder="(555) 555-5555"
        [(ngModel)]="phone"
        (ngModelChange)="onPhoneInput($event)"
        name="phone"
        required
      />
    </div>
    <ion-segment [value]="profileType" (ionChange)="onProfileTypeChange($event.detail.value)">
      <ion-segment-button value="user">
        <ion-label>Regular</ion-label>
      </ion-segment-button>
      <ion-segment-button value="fighter">
        <ion-label>Fighter</ion-label>
      </ion-segment-button>
    </ion-segment>
    <ion-item lines="none" class="auth-check-item">
      <ion-checkbox slot="start" [(ngModel)]="confirmedAdult" name="confirmedAdult" />
      <ion-label class="auth-check-label">I am over 18 years old</ion-label>
    </ion-item>
    <ion-item lines="none" class="auth-check-item">
      <ion-checkbox slot="start" [(ngModel)]="acceptedTerms" name="acceptedTerms" />
      <ion-label class="auth-check-label">
        I agree to the
        <a routerLink="/terms" class="accent-link">Terms of Use</a>
        and
        <a routerLink="/privacy" class="accent-link">Privacy Policy</a>
      </ion-label>
    </ion-item>
    <ion-input
      label="Password"
      labelPlacement="stacked"
      [type]="passwordVisible ? 'text' : 'password'"
      autocomplete="new-password"
      [(ngModel)]="password"
      name="password"
      required
    >
      <app-password-visibility-toggle
        [shown]="passwordVisible"
        (toggled)="passwordVisible = !passwordVisible"
      />
    </ion-input>
    <ion-input
      label="Confirm password"
      labelPlacement="stacked"
      [type]="confirmPasswordVisible ? 'text' : 'password'"
      autocomplete="new-password"
      [(ngModel)]="confirm"
      name="confirm"
      required
    >
      <app-password-visibility-toggle
        [shown]="confirmPasswordVisible"
        (toggled)="confirmPasswordVisible = !confirmPasswordVisible"
        ariaShowPassword="Show confirm password"
        ariaHidePassword="Hide confirm password"
      />
    </ion-input>
    <ion-button expand="block" type="submit" class="kinetic-gradient" [disabled]="!canSubmit">
      Create account
    </ion-button>
    <ion-button
      expand="block"
      fill="outline"
      type="button"
      class="oauth-mac"
      (click)="oauth('google')"
    >
      <span slot="start" class="oauth-brand" aria-hidden="true">
        <svg class="oauth-svg oauth-svg-google" viewBox="0 0 24 24" focusable="false">
          <path
            fill="#4285F4"
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
          />
          <path
            fill="#34A853"
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
          />
          <path
            fill="#FBBC05"
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
          />
          <path
            fill="#EA4335"
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
          />
        </svg>
      </span>
      Continue with Google
    </ion-button>
    <ion-button
      expand="block"
      fill="outline"
      type="button"
      class="oauth-mac oauth-apple"
      (click)="oauth('apple')"
    >
      <span slot="start" class="oauth-brand" aria-hidden="true">
        <svg class="oauth-svg oauth-svg-apple" viewBox="0 0 24 24" focusable="false">
          <path
            fill="currentColor"
            d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"
          />
        </svg>
      </span>
      Continue with Apple
    </ion-button>
    <p class="footer-links">
      Already have an account?
      <a routerLink="/login" class="accent-link">Sign in</a>
    </p>
  </form>
</ion-content>
