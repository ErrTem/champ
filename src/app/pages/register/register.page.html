<ion-content class="auth-shell" fullscreen="true">
  <div class="auth-hero">
    <p class="kicker">Champ</p>
    <h1 class="display">Join the gallery</h1>
    <p class="sub">Train with legends — secure account, no token storage in the browser.</p>
  </div>

  <form class="auth-form" (ngSubmit)="submit()">
    @if (error) {
      <ion-text color="danger"><p class="field-error">{{ error }}</p></ion-text>
    }
    <ion-input
      label="Name"
      labelPlacement="stacked"
      type="text"
      autocomplete="name"
      [(ngModel)]="name"
      name="name"
    />
    <ion-input
      label="Email"
      labelPlacement="stacked"
      type="email"
      autocomplete="email"
      [(ngModel)]="email"
      name="email"
      required
    />
    <ion-input
      label="Phone"
      labelPlacement="stacked"
      type="tel"
      autocomplete="tel"
      [(ngModel)]="phone"
      (ngModelChange)="onPhoneInput($event)"
      name="phone"
      required
    />
    <ion-segment [value]="profileType" (ionChange)="profileType = ($event.detail.value as any)">
      <ion-segment-button value="user">
        <ion-label>Regular</ion-label>
      </ion-segment-button>
      <ion-segment-button value="fighter">
        <ion-label>Fighter</ion-label>
      </ion-segment-button>
    </ion-segment>
    <ion-item lines="none">
      <ion-checkbox slot="start" [(ngModel)]="confirmedAdult" name="confirmedAdult" />
      <ion-label>I confirm I am 18+</ion-label>
    </ion-item>
    <ion-item lines="none">
      <ion-checkbox slot="start" [(ngModel)]="acceptedTerms" name="acceptedTerms" />
      <ion-label>
        I accept
        <a routerLink="/terms" class="accent-link">Terms</a>
      </ion-label>
    </ion-item>
    <ion-input
      label="Password"
      labelPlacement="stacked"
      type="password"
      autocomplete="new-password"
      [(ngModel)]="password"
      name="password"
      required
    />
    <ion-input
      label="Confirm password"
      labelPlacement="stacked"
      type="password"
      autocomplete="new-password"
      [(ngModel)]="confirm"
      name="confirm"
      required
    />
    <ion-button expand="block" type="submit" class="kinetic-gradient" [disabled]="!canSubmit">
      Create account
    </ion-button>
    <ion-button expand="block" fill="outline" type="button" (click)="oauth('google')">
      Continue with Google
    </ion-button>
    <ion-button expand="block" fill="outline" type="button" (click)="oauth('apple')">
      Continue with Apple
    </ion-button>
    <p class="footer-links">
      Already have an account?
      <a routerLink="/login" class="accent-link">Sign in</a>
    </p>
  </form>
</ion-content>
