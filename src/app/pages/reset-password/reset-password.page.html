<ion-content class="auth-shell" fullscreen="true">
  <div class="auth-hero">
    <p class="kicker">Champ</p>
    <h1 class="display">Choose a password</h1>
    <p class="sub">Use the link from your email (dev: server console).</p>
  </div>

  <form class="auth-form" (ngSubmit)="submit()">
    @if (error) {
      <ion-text color="danger"><p class="field-error">{{ error }}</p></ion-text>
    }
    <ion-input
      label="New password"
      labelPlacement="stacked"
      [type]="passwordVisible ? 'text' : 'password'"
      autocomplete="new-password"
      [(ngModel)]="password"
      name="password"
      required
    >
      <app-password-visibility-toggle
        [shown]="passwordVisible"
        (toggled)="passwordVisible = !passwordVisible"
      />
    </ion-input>
    <ion-input
      label="Confirm password"
      labelPlacement="stacked"
      [type]="confirmPasswordVisible ? 'text' : 'password'"
      autocomplete="new-password"
      [(ngModel)]="confirm"
      name="confirm"
      required
    >
      <app-password-visibility-toggle
        [shown]="confirmPasswordVisible"
        (toggled)="confirmPasswordVisible = !confirmPasswordVisible"
        ariaShowPassword="Show confirm password"
        ariaHidePassword="Hide confirm password"
      />
    </ion-input>
    <ion-button expand="block" type="submit" class="kinetic-gradient">Update password</ion-button>
    <p class="footer-links"><a routerLink="/login">Back to sign in</a></p>
  </form>
</ion-content>
