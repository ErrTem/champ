<ion-content class="auth-shell" fullscreen="true">
  <div class="auth-hero">
    <p class="kicker">Champ</p>
    <h1 class="display">Forgot password</h1>
    <p class="sub">We will email instructions if an account exists.</p>
  </div>

  <form class="auth-form" (ngSubmit)="submit()">
    @if (message) {
      <ion-text color="success"><p class="field-error">{{ message }}</p></ion-text>
    }
    @if (error) {
      <ion-text color="danger"><p class="field-error">{{ error }}</p></ion-text>
    }
    <ion-input
      label="Email"
      labelPlacement="stacked"
      type="email"
      autocomplete="email"
      [(ngModel)]="email"
      name="email"
      required
    />
    <ion-button expand="block" type="submit" class="kinetic-gradient">Send link</ion-button>
    <p class="footer-links"><a routerLink="/login">Back to sign in</a></p>
  </form>
</ion-content>
