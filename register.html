<body class="bg-background min-h-screen selection:bg-primary/30">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center px-6 h-16 bg-background/70 backdrop-blur-xl bg-gradient-to-b from-black/20 to-transparent">
<button class="flex items-center justify-center w-10 h-10 text-primary hover:text-primary-fixed transition-colors scale-95 active:scale-90 transition-transform" type="button" aria-label="Back">

</button>
<div class="flex-1 text-center">
<h1 class="text-xl font-black italic text-primary tracking-tight tracking-tighter uppercase font-headline">ELITE ATHLETIC</h1>
</div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="relative pt-24 pb-12 px-6 flex flex-col items-center justify-center min-h-screen overflow-hidden">
<!-- Background Imagery (The Kinetic Gallery) -->
<div class="fixed inset-0 z-0">
<img alt="Elite Training Background" class="w-full h-full object-cover opacity-20 grayscale brightness-50" data-alt="dramatic low-key black and white photo of a focused boxer in a dark gym with harsh spotlight highlighting muscle definition" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCmmgcqN0cTi1C6P16c_dUIIF1Jkhg0oeYXgKdX5LkPWK0y4Z3BYOa5jup2hfa0Md5-aDeJxlgIm98h7nuDjZzlj1P3LQOK1hcft8qNlmQ2O-REC6H_ndXA-J9CwBECc6fRcgkyzhC6VFc8VHeL-io3hPwmALZVC-PX0BO4qpphDCz4oicHXUtzD7qZ066gx04D37hDhw9GY6YQca-lLYl_K9TdKX8taM3wLT0WWu5R22CH3VwQ8QtdlsQS79RaNJVYcoIQQVTkAV7U"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-background/50"></div>
</div>
<!-- Registration Container -->
<div class="relative z-10 w-full max-w-md">
<!-- Headline Group -->
<div class="mb-10 text-center md:text-left">
<p class="font-label text-secondary text-xs font-bold tracking-[0.2em] uppercase mb-2">Phase One</p>
<h2 class="font-display text-4xl md:text-5xl font-black tracking-tighter text-on-surface leading-none uppercase">
                    Join The <span class="text-primary italic">Elite</span>
</h2>
<p class="font-body text-on-surface-variant text-sm mt-3 max-w-[280px]">Forging world-class athletes through precision and power.</p>
</div>
<!-- Registration Form -->
<form id="register-form" class="space-y-6" action="#" method="post" novalidate>
<!-- Inputs Section -->
<div class="space-y-4">
<div class="group">
<label class="font-label text-[10px] font-black text-on-surface-variant uppercase tracking-widest ml-1 mb-1 block group-focus-within:text-primary transition-colors" for="register-full-name">Full Name</label>
<input class="register-field-input w-full bg-surface-container-highest border-none rounded-lg p-4 text-on-surface placeholder:text-neutral-600 focus:ring-0 focus:bg-surface-variant transition-all outline outline-1 outline-outline-variant/15 focus:outline-primary/40" id="register-full-name" name="fullName" type="text" autocomplete="name" placeholder="ALEXANDER VOLKOV" aria-describedby="register-full-name-error"/>
<p id="register-full-name-error" class="mt-1.5 ml-1 text-xs font-medium text-error hidden" role="alert"></p>
</div>
<div class="group">
<label class="font-label text-[10px] font-black text-on-surface-variant uppercase tracking-widest ml-1 mb-1 block group-focus-within:text-primary transition-colors" for="register-email">Email Address</label>
<input class="register-field-input w-full bg-surface-container-highest border-none rounded-lg p-4 text-on-surface placeholder:text-neutral-600 focus:ring-0 focus:bg-surface-variant transition-all outline outline-1 outline-outline-variant/15 focus:outline-primary/40" id="register-email" name="email" type="email" autocomplete="email" placeholder="athlete@elite.com" aria-describedby="register-email-error"/>
<p id="register-email-error" class="mt-1.5 ml-1 text-xs font-medium text-error hidden" role="alert"></p>
</div>
<div class="group">
<label class="font-label text-[10px] font-black text-on-surface-variant uppercase tracking-widest ml-1 mb-1 block group-focus-within:text-primary transition-colors" for="register-phone">Phone Number</label>
<input class="register-field-input w-full bg-surface-container-highest border-none rounded-lg p-4 text-on-surface placeholder:text-neutral-600 focus:ring-0 focus:bg-surface-variant transition-all outline outline-1 outline-outline-variant/15 focus:outline-primary/40" id="register-phone" name="phone" type="tel" autocomplete="tel" placeholder="+1 (555) 000-0000" aria-describedby="register-phone-error"/>
<p id="register-phone-error" class="mt-1.5 ml-1 text-xs font-medium text-error hidden" role="alert"></p>
</div>
</div>
<!-- Training Interests (Exclusive Badge style) -->
<!-- TOS Checkbox -->
<div class="flex items-start gap-3 px-1 pt-2">
<div id="register-tos-wrap" class="relative flex shrink-0 items-center rounded transition-shadow">
<input class="w-5 h-5 rounded border-none bg-surface-container-highest text-primary focus:ring-0 cursor-pointer" id="register-tos" name="tosAccepted" type="checkbox" aria-describedby="register-tos-error"/>
</div>
<div class="min-w-0 flex-1">
<label class="text-[11px] leading-tight text-on-surface-variant font-medium" for="register-tos">
                        I acknowledge that high-intensity training carries risks and I agree to the 
                        <a class="text-primary hover:underline" href="#">Terms of Service</a> and 
                        <a class="text-primary hover:underline" href="#">Privacy Policy</a>.
                    </label>
<p id="register-tos-error" class="mt-2 text-xs font-medium text-error hidden" role="alert"></p>
</div>
</div>

</button>
</div>

<p class="text-on-surface-variant text-xs font-medium">

</div>

<span class="h-1 w-24 bg-primary"></span>

<span class="h-1 w-32 bg-primary"></span>
</div>

</main>
<!-- Suppressed BottomNavBar as per "Shell Visibility & Relevance" rule for Transactional pages -->
<script>
(function () {
  var form = document.getElementById('register-form');
  if (!form) return;

  var cfg = {
    fullName: { input: 'register-full-name', error: 'register-full-name-error' },
    email: { input: 'register-email', error: 'register-email-error' },
    phone: { input: 'register-phone', error: 'register-phone-error' },
    tos: { input: 'register-tos', error: 'register-tos-error', wrap: 'register-tos-wrap' }
  };

  function digitsOnly(s) {
    return String(s).replace(/\D/g, '');
  }

  function validateFullName(value) {
    var t = String(value).trim();
    if (!t) return 'Full name is required.';
    if (t.length < 2) return 'Full name must be at least 2 characters.';
    return '';
  }

  function validateEmail(value) {
    var t = String(value).trim();
    if (!t) return 'Email address is required.';
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(t)) return 'Enter a valid email address (for example athlete@elite.com).';
    return '';
  }

  function validatePhone(value) {
    var t = String(value).trim();
    if (!t) return 'Phone number is required.';
    var d = digitsOnly(t);
    if (d.length < 8) return 'Phone number is too short. Include your area or country code (at least 8 digits).';
    if (d.length > 15) return 'Phone number is too long (maximum 15 digits).';
    return '';
  }

  function validateTos(checked) {
    if (!checked) return 'You must accept the Terms of Service and Privacy Policy to create an account.';
    return '';
  }

  function setFieldState(key, message) {
    var c = cfg[key];
    var input = document.getElementById(c.input);
    var err = document.getElementById(c.error);
    if (!input || !err) return;
    var hasError = Boolean(message);
    if (hasError) {
      err.textContent = message;
      err.classList.remove('hidden');
      input.setAttribute('aria-invalid', 'true');
    } else {
      err.textContent = '';
      err.classList.add('hidden');
      input.removeAttribute('aria-invalid');
    }
    if (key === 'tos') {
      var wrap = c.wrap ? document.getElementById(c.wrap) : null;
      if (wrap) wrap.classList.toggle('register-tos-invalid', hasError);
    } else {
      input.classList.toggle('register-field-invalid', hasError);
    }
  }

  function runValidators() {
    return {
      fullName: validateFullName(document.getElementById(cfg.fullName.input).value),
      email: validateEmail(document.getElementById(cfg.email.input).value),
      phone: validatePhone(document.getElementById(cfg.phone.input).value),
      tos: validateTos(document.getElementById(cfg.tos.input).checked)
    };
  }

  var fieldOrder = ['fullName', 'email', 'phone', 'tos'];
  fieldOrder.forEach(function (key) {
    var id = cfg[key].input;
    var el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', function () {
      setFieldState(key, '');
    });
    el.addEventListener('change', function () {
      setFieldState(key, '');
    });
  });

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var results = runValidators();
    var firstInvalid = null;
    fieldOrder.forEach(function (key) {
      var msg = results[key];
      setFieldState(key, msg);
      if (msg && !firstInvalid) firstInvalid = key;
    });
    if (firstInvalid) {
      var focusEl = document.getElementById(cfg[firstInvalid].input);
      if (focusEl) focusEl.focus();
      return;
    }
  });
})();
</script>
</body></html>
