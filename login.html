        }
        .kinetic-gradient {
            background: linear-gradient(135deg, #ffb4a8 0%, #ff5540 100%);

            border: 1px solid rgba(177, 135, 128, 0.15);
        }
        body {

            font-family: 'Manrope', sans-serif;
            color: #e2e2e2;
        }

<style>

<body class="bg-background min-h-screen selection:bg-primary/30">
<!-- TopAppBar — matches register -->
<header class="fixed top-0 w-full z-50 flex items-center px-6 h-16 bg-background/70 backdrop-blur-xl bg-gradient-to-b from-black/20 to-transparent">
<button class="flex items-center justify-center w-10 h-10 text-primary hover:text-primary-fixed transition-colors scale-95 active:scale-90 transition-transform" type="button" aria-label="Back">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex-1 text-center">
<h1 class="text-xl font-black italic text-primary tracking-tight tracking-tighter uppercase font-headline">ELITE ATHLETIC</h1>
</div>
<div class="w-10"></div>
</header>
<main class="relative pt-24 pb-12 px-6 flex flex-col items-center justify-center min-h-screen overflow-hidden">
<div class="fixed inset-0 z-0">
<img alt="Elite Training Background" class="w-full h-full object-cover opacity-20 grayscale brightness-50" data-alt="dramatic low-key black and white photo of a focused boxer in a dark gym with harsh spotlight highlighting muscle definition" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCmmgcqN0cTi1C6P16c_dUIIF1Jkhg0oeYXgKdX5LkPWK0y4Z3BYOa5jup2hfa0Md5-aDeJxlgIm98h7nuDjZzlj1P3LQOK1hcft8qNlmQ2O-REC6H_ndXA-J9CwBECc6fRcgkyzhC6VFc8VHeL-io3hPwmALZVC-PX0BO4qpphDCz4oicHXUtzD7qZ066gx04D37hDhw9GY6YQca-lLYl_K9TdKX8taM3wLT0WWu5R22CH3VwQ8QtdlsQS79RaNJVYcoIQQVTkAV7U"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-background/50"></div>
</div>
<div class="relative z-10 w-full max-w-md">
<div class="mb-10 text-center md:text-left">
<p class="font-label text-secondary text-xs font-bold tracking-[0.2em] uppercase mb-2">Welcome back</p>
<h2 class="font-display text-4xl md:text-5xl font-black tracking-tighter text-on-surface leading-none uppercase">
                    Enter The <span class="text-primary italic">Arena</span>
</h2>
<p class="font-body text-on-surface-variant text-sm mt-3 max-w-[280px]">Sign in to continue your training journey.</p>
</div>
<form class="space-y-6" action="#" method="post">
<div class="space-y-4">
<div class="group">
<label class="font-label text-[10px] font-black text-on-surface-variant uppercase tracking-widest ml-1 mb-1 block group-focus-within:text-primary transition-colors" for="login-email">Email Address</label>
<input class="w-full bg-surface-container-highest border-none rounded-lg p-4 text-on-surface placeholder:text-neutral-600 focus:ring-0 focus:bg-surface-variant transition-all outline outline-1 outline-outline-variant/15 focus:outline-primary/40" id="login-email" placeholder="athlete@elite.com" type="email" autocomplete="email"/>
</div>
<div class="group">
<label class="font-label text-[10px] font-black text-on-surface-variant uppercase tracking-widest ml-1 mb-1 block group-focus-within:text-primary transition-colors" for="login-password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-lg p-4 pr-12 text-on-surface placeholder:text-neutral-600 focus:ring-0 focus:bg-surface-variant transition-all outline outline-1 outline-outline-variant/15 focus:outline-primary/40" id="login-password" placeholder="••••••••" type="password" autocomplete="current-password"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 flex h-10 w-10 items-center justify-center text-on-surface-variant hover:text-primary transition-colors rounded-lg" type="button" aria-label="Show password" id="toggle-password">
<span class="material-symbols-outlined text-[22px]">visibility</span>
</button>
</div>
</div>
</div>
<p class="text-right px-1 -mt-2">
<a class="text-xs font-medium text-primary hover:underline" href="#">Forgot password?</a>
</p>
<div class="pt-2">
<button class="w-full kinetic-gradient py-5 rounded-lg text-on-primary font-black uppercase tracking-[0.2em] shadow-2xl shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3" type="submit">
                        Log In
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<div class="pt-6">
<div class="flex items-center gap-4 mb-6">
<div class="h-px flex-1 bg-outline-variant/20"></div>
<span class="text-on-surface-variant text-[10px] uppercase tracking-widest font-label font-bold">Or continue with</span>
<div class="h-px flex-1 bg-outline-variant/20"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="ghost-border bg-surface-container-low h-12 flex items-center justify-center gap-3 rounded-lg hover:bg-surface-container-high transition-colors text-on-surface" type="button">
<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M17.05 20.28c-.96.95-2.18 1.72-3.72 1.72-2.11 0-3.48-1.28-4.71-1.28-1.23 0-2.8 1.25-4.52 1.25-2.22 0-4.63-1.63-5.83-3.74-1.28-2.26-1.28-5.36 0-7.62 1.2-2.11 3.61-3.74 5.83-3.74 1.72 0 3.29 1.25 4.52 1.25 1.23 0 2.6-1.28 4.71-1.28.16 0 .32.01.47.02-3.23.27-5.82 2.94-5.82 6.13 0 3.19 2.59 5.86 5.82 6.13.08.01.16.01.25.01v.01zM11.63 3.5c-.17-2.07 1.4-3.5 1.4-3.5s1.6 0 3.16 1.95c.23.28.37.6.43.92-1.62-.05-3.09 1.07-4.44 2.45-.16-.62-.4-1.22-.55-1.82z"></path></svg>
<span class="text-sm font-medium font-body">Apple</span>
</button>
<button class="ghost-border bg-surface-container-low h-12 flex items-center justify-center gap-3 rounded-lg hover:bg-surface-container-high transition-colors text-on-surface" type="button">
<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg>
<span class="text-sm font-medium font-body">Google</span>
</button>
</div>
</div>
<div class="text-center pt-4">
<p class="text-on-surface-variant text-xs font-medium font-body">
                        Need an account?
                        <a class="text-secondary font-bold hover:text-secondary-fixed transition-colors ml-1" href="register.html">SIGN UP</a>
</p>
</div>
</form>
</div>
<div class="absolute bottom-12 left-12 hidden lg:block opacity-40">
<div class="flex flex-col gap-1">
<span class="h-1 w-24 bg-primary"></span>
<span class="h-1 w-16 bg-on-surface-variant"></span>
<span class="h-1 w-32 bg-primary"></span>
</div>
</div>
</main>
<script>
(function () {
  var input = document.getElementById('login-password');
  var btn = document.getElementById('toggle-password');
  if (!input || !btn) return;
  btn.addEventListener('click', function () {
    var show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    btn.querySelector('.material-symbols-outlined').textContent = show ? 'visibility_off' : 'visibility';
  });
})();
</script>
</body></html>
